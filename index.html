<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מקרא AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Frank+Ruhl+Libre:wght@300;400;700&family=David+Libre&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app">

    <!-- ===== TOP BAR ===== -->
    <header id="topbar">
      <div class="tb-group">
        <span class="app-logo">מקרא<span class="ai-badge">AI</span></span>
      </div>
      <div class="tb-group tb-center">
        <button class="tb-btn" id="btn-zoom-out" title="הקטן"><i class="fas fa-minus"></i></button>
        <span id="zoom-label">100%</span>
        <button class="tb-btn" id="btn-zoom-in" title="הגדל"><i class="fas fa-plus"></i></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" id="btn-add-page" title="עמוד חדש"><i class="fas fa-plus"></i> עמוד</button>
      </div>
      <div class="tb-group">
        <button class="tb-btn" id="btn-import"><i class="fas fa-file-import"></i> ייבא</button>
        <button class="tb-btn primary" id="btn-export"><i class="fas fa-file-pdf"></i> PDF</button>
      </div>
    </header>

    <!-- ===== TOOLBOX ===== -->
    <aside id="toolbox">
      <button class="tool active" data-tool="select" title="בחר [V]">
        <i class="fas fa-mouse-pointer"></i>
      </button>
      <button class="tool" data-tool="frame" title="תיבת טקסט [F]">
        <i class="far fa-square"></i>
      </button>
      <div class="tool-divider"></div>
      <button class="tool" id="btn-ai" title="עימוד אוטומטי [A]">
        <i class="fas fa-wand-magic-sparkles"></i>
      </button>
    </aside>

    <!-- ===== CANVAS ===== -->
    <div id="workspace">
      <div id="canvas"></div>
    </div>

    <!-- ===== INSPECTOR ===== -->
    <aside id="inspector">
      <div id="ins-empty" class="ins-state">
        <i class="fas fa-arrow-pointer"></i>
        <p>בחר תיבה לעריכה</p>
      </div>
      <div id="ins-frame" class="ins-state hidden">

        <div class="ins-section">
          <div class="ins-title">מיקום וגודל</div>
          <div class="ins-row">
            <label>X<input type="number" id="pi-x"></label>
            <label>Y<input type="number" id="pi-y"></label>
          </div>
          <div class="ins-row">
            <label>W<input type="number" id="pi-w"></label>
            <label>H<input type="number" id="pi-h"></label>
          </div>
        </div>

        <div class="ins-section">
          <div class="ins-title">טיפוגרפיה</div>
          <label class="ins-full">גופן
            <select id="pi-font">
              <option value="Frank Ruhl Libre">Frank Ruhl Libre</option>
              <option value="David Libre">David Libre</option>
              <option value="Assistant">Assistant</option>
            </select>
          </label>
          <div class="ins-row">
            <label>גודל<input type="number" id="pi-size" min="6" max="72"></label>
            <label>שורה<input type="number" id="pi-lh" min="0.8" max="3" step="0.1"></label>
          </div>
        </div>

        <div class="ins-section">
          <div class="ins-title">שרשור</div>
          <button class="ins-btn" id="btn-thread">
            <i class="fas fa-link"></i> חבר לתיבה
          </button>
          <div id="thread-info" class="thread-info"></div>
        </div>

        <div class="ins-section">
          <button class="ins-btn danger" id="btn-delete-frame">
            <i class="fas fa-trash"></i> מחק תיבה
          </button>
        </div>

      </div>
    </aside>

  </div><!-- #app -->

  <!-- ===== IMPORT MODAL ===== -->
  <div id="modal-overlay" class="hidden">
    <div class="modal">
      <div class="modal-head">
        <h2>ייבא טקסט</h2>
        <button id="btn-modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-tabs">
        <button class="mtab active" data-tab="paste">הדבק</button>
        <button class="mtab" data-tab="file">קובץ</button>
      </div>
      <div class="modal-body">
        <div class="mtab-pane" id="tab-paste">
          <textarea id="import-ta" placeholder="הדבק טקסט כאן..."></textarea>
        </div>
        <div class="mtab-pane hidden" id="tab-file">
          <div class="dropzone" id="dropzone">
            <i class="fas fa-cloud-upload-alt fa-3x"></i>
            <p>גרור קובץ לכאן</p>
            <button class="browse-btn" id="btn-browse">בחר קובץ</button>
            <input type="file" id="file-input" accept=".txt,.docx" hidden>
            <span class="file-hint">.txt · .docx</span>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-primary" id="btn-do-import">ייבא</button>
        <button class="btn-secondary" id="btn-cancel-import">ביטול</button>
      </div>
    </div>
  </div>

  <!-- ===== THREAD MODE BANNER ===== -->
  <div id="thread-banner" class="hidden">
    <i class="fas fa-link"></i>
    <span>לחץ על תיבת היעד לחיבור</span>
    <button id="btn-cancel-thread">ביטול</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
